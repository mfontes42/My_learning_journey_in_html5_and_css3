<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="css3.ico" type="image/x-ico">
    <title>Gradientes em CSS3</title>
    <!--<link rel="stylesheet" href="style02.css">-->
    <style>
        * {/*configuracoes globais das css, faz-se com o selector asterisco (*) */
            height: 100%;
        }
        body {
            background-image: linear-gradient(160deg, #9305F2 10%, #F205CB 20%, #F20574, #F29F05, #F27405);
            background-attachment: fixed; /*para fixar o gradiente no site*/
        }
    </style>
</head>
<body>
    <h1>Testando Gradientes</h1>
</body>
</html>
