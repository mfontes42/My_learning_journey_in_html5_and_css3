<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symbols and emojis</title>
</head>
<body>
    <h1>special symbols</h1>
    <hr>
    <p>
        let's add some special symbols:<br>

        &Delta;
        &delta;
        &euro;
        &yen;
        &uparrow;
        &reg;
        &copy;

    <hr>
    <p>
        let's add some emojis:<br>

        &#x1F611;
        &#x1FAE9;
        &#x1F9D0;
    </p>
    <hr>
</body>
</html>
