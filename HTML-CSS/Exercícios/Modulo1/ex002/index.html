<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraphs</title>
</head>
<body>
    <h1>Paragraphs and newlines</h1>
    <hr>
    <p>
        You can 
        write a     paragraph 
        anyway. 
        
        You only have 
        to put it into a pair 
        of tags &lt;p&gt; and &lt;/p&gt;. <!--lt = less than, gt = greater than-->
    </p>
    <p>
        if you need to break the text in some specific area, you can use a &lt;br&gt; tag.
        for example I'll break this line rigth here  just before the 'can you see' sentence ---&gt; <br> can you see?
    </p>
</body>
</html>
